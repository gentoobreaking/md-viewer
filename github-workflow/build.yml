name: Build md-viewer

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release?'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Read version from VERSION file ────────────────────
      - name: Read version
        run: echo "MARKETING_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      # ── Go ────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Restore / save build number across runs ───────────
      - name: Restore build number
        uses: actions/cache@v4
        with:
          path: .build_number
          key: build-number-${{ github.ref }}
          restore-keys: build-number-

      # ── Run your existing build script ────────────────────
      - name: Build
        run: |
          chmod +x build.sh
          ./build.sh
        # build.sh 會自己讀 VERSION 檔，不需要額外傳入 env

      # ── Create DMG ────────────────────────────────────────
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "md-viewer ${{ env.MARKETING_VERSION }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "md-viewer.app" 175 190 \
            --hide-extension "md-viewer.app" \
            --app-drop-link 425 190 \
            "md-viewer-${{ env.MARKETING_VERSION }}.dmg" \
            "md-viewer.app"

      # ── Upload DMG as artifact (every run) ────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-viewer-${{ env.MARKETING_VERSION }}-dmg
          path: md-viewer-${{ env.MARKETING_VERSION }}.dmg
          retention-days: 14

      # ── Create GitHub Release (only when toggled on) ──────
      - name: Create GitHub Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.MARKETING_VERSION }}
          name: md-viewer v${{ env.MARKETING_VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: md-viewer-${{ env.MARKETING_VERSION }}.dmg
