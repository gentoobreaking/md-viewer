<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
(function() {
  var t = window.__mermaidTheme || 'default';
  var isDark = t === 'dark' || t === 'solarized' || t === 'nord';
  if (t === 'auto') isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default' });
  window.switchMermaidTheme = function(theme) {
    if (typeof mermaid === 'undefined') return;
    mermaid.initialize({ startOnLoad: false, theme: theme === 'dark' ? 'dark' : 'default' });
    // Remove existing mermaid SVG wrappers
    document.querySelectorAll('.mermaid-svg').forEach(function(w) { w.remove(); });
    // Show hidden .mermaid elements and re-render
    var els = document.querySelectorAll('.mermaid');
    els.forEach(function(el) { el.style.display = ''; });
    setTimeout(function() {
      var i = 0;
      function next() {
        if (i >= els.length) return;
        var el = els[i];
        var code = (el.textContent || '').trim();
        i++;
        if (!code) { next(); return; }
        mermaid.parse(code).then(function() {
          return mermaid.render('ms-theme-' + Date.now() + '-' + i, code);
        }).then(function(result) {
          var wrapper = document.createElement('div');
          wrapper.className = 'mermaid-svg';
          wrapper.style.cssText = 'margin:1em 0;overflow-x:auto;';
          wrapper.innerHTML = result.svg;
          el.parentNode.insertBefore(wrapper, el.nextSibling);
          el.style.display = 'none';
          next();
        }).catch(function() { next(); });
      }
      next();
    }, 100);
  };
})();
</script>

// Global zoom functions (available immediately for Eval calls)
window.zoomState = { level: 1.0, step: 0.1 };
window._zoomTimer = null;
window.applyZoomLevel = function(level) {
  var minZoom = 0.5, maxZoom = 2.0;
  level = Math.max(minZoom, Math.min(maxZoom, level));
  window.zoomState.level = level;
  if (document.body) document.body.style.zoom = level;
  if (window._findSchedulePaint) window._findSchedulePaint();
  
  // 強制更新所有顯示縮放文字的地方
  var zt = document.getElementById('zoomText');
  if (zt) {
    zt.innerText = Math.round(level * 100) + '%';
  }
  
  if (window.saveZoomLevel) window.saveZoomLevel(level);
  window.showZoomIndicator(Math.round(level * 100));
};
window.showZoomIndicator = function(pct) {
  // Floating indicator (fades out after 1.5s)
  var el = document.getElementById('zoomIndicator');
  if (!el) {
    el = document.createElement('div');
    el.id = 'zoomIndicator';
    el.style.cssText = 'position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.8);color:white;padding:5px 12px;border-radius:6px;font-size:13px;font-weight:bold;z-index:99999;pointer-events:none;transition:opacity 0.3s;';
    if (document.body) document.body.appendChild(el);
  }
  if (el) {
    el.innerText = pct + '%';
    el.style.opacity = '1';
    clearTimeout(window._zoomTimer);
    window._zoomTimer = setTimeout(function(){ el.style.opacity = '0'; }, 1500);
  }
};

window.applyLineNumbers = function(show) {
  var container = document.getElementById('mdContent');
  if (!container) return;
  if (show) {
    container.classList.add('line-numbers-mode');
    document.querySelectorAll('pre code').forEach(function(codeBlock) {
      if (codeBlock.classList.contains('mermaid')) return;
      if (codeBlock.querySelector('.line-number')) return;
      var text = codeBlock.innerText;
      var lines = text.split('\n');
      if (lines[lines.length-1] === '') lines.pop();
      var newHtml = '';
      lines.forEach(function(line, index) {
        newHtml += '<span class="line-number">' + (index + 1) + '</span><span class="line-content">' + (line || ' ') + '</span>\n';
      });
      codeBlock.innerHTML = newHtml;
    });
  } else {
    container.classList.remove('line-numbers-mode');
  }
};

window.initCodeBlocks = function() {
  document.querySelectorAll('pre').forEach(function(pre) {
    if (pre.querySelector('.code-copy-btn')) return;
    var btn = document.createElement('button');
    btn.className = 'code-copy-btn';

      var val = this.value;
      window.applyTheme(val);
      if (window.saveTheme) window.saveTheme(val);
      if (window.mdConfig) window.mdConfig.theme = val;
    });
  }
  var zoomSlider = document.getElementById('zoomSensitivity');
  if (zoomSlider) {
    zoomSlider.addEventListener('input', function() {
      var level = parseInt(this.value, 10);
      if (window.saveZoomSensitivity) window.saveZoomSensitivity(level);
      if (window.applyZoomSensitivity) window.applyZoomSensitivity(level);
      if (window.mdConfig) window.mdConfig.zoomSensitivity = level;
    });
  }
  var fontFamilySelect = document.getElementById('fontFamily');
  if (fontFamilySelect) {
    fontFamilySelect.addEventListener('change', function() {
      var val = this.value;
      document.body.style.fontFamily = val;
      // Read current fontSize from the select element, not from mdConfig
      var fsEl = document.getElementById('fontSize');
      var currentSize = fsEl ? parseInt(fsEl.value, 10) : 16;
      if (window.saveFont) {
        window.saveFont(val, currentSize);
      }
      // Update local mdConfig
      if (window.mdConfig) window.mdConfig.fontFamily = val;
    });
  }
  var fontSizeSelect = document.getElementById('fontSize');
  if (fontSizeSelect) {
    fontSizeSelect.addEventListener('change', function() {
      var val = parseInt(this.value, 10);
      document.body.style.fontSize = val + 'px';
      // Save both fontFamily AND fontSize together
      var ff = document.getElementById('fontFamily');
      var fv = ff ? ff.value : (window.mdConfig && window.mdConfig.fontFamily) || '-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif';
      if (window.saveFont) window.saveFont(fv, val);
      // Update local mdConfig
      if (window.mdConfig) { window.mdConfig.fontFamily = fv; window.mdConfig.fontSize = val; }
    });
  }
  var langSelect = document.getElementById('language');
  if (langSelect) {
    langSelect.addEventListener('change', function() {
      var val = this.value;
      if (window.saveLanguage) window.saveLanguage(val);
      if (window.applyLanguage) window.applyLanguage(val);
      if (window.mdConfig) window.mdConfig.language = val;
    });
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (window._findIsBarVisible && window._findIsBarVisible()) {
        window.hideFindBar && window.hideFindBar();
        e.preventDefault();
        return;
      }
      window.hideSettingsPanel && window.hideSettingsPanel();
    }
  });
  var closeBtn = document.getElementById('settingsClose');
  if (closeBtn) closeBtn.addEventListener('click', window.hideSettingsPanel);

  var tpCancelBtn = document.getElementById('tp-cancel');
  if (tpCancelBtn) tpCancelBtn.addEventListener('click', window.hideTranslatePanel);
  var tpStartBtn = document.getElementById('tp-start');
  if (tpStartBtn) tpStartBtn.addEventListener('click', window.doTranslate);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (window._findIsBarVisible && window._findIsBarVisible()) {
        window.hideFindBar && window.hideFindBar();
        e.preventDefault();
        return;
      }
      window.hideSettingsPanel && window.hideSettingsPanel();
      window.hideTranslatePanel && window.hideTranslatePanel();
    }
  });

  var lineNumsCheckbox = document.getElementById('showLineNumbers');
  if (lineNumsCheckbox) {
    lineNumsCheckbox.addEventListener('change', function() {
      var val = this.checked;
      window.applyLineNumbers(val);
      if (window.saveLineNumbers) window.saveLineNumbers(val);
      if (window.mdConfig) window.mdConfig.showLineNumbers = val;
    });
  }

  var debugCheckbox = document.getElementById('debugModeCheck');
  if (debugCheckbox) {
    var initCfg = window._initConfig || window.mdConfig;
    if (initCfg) debugCheckbox.checked = !!initCfg.debugMode;
    debugCheckbox.addEventListener('change', function() {
      var val = this.checked;
      if (window.mdConfig) window.mdConfig.debugMode = val;
      if (window.applyDebugBadge) window.applyDebugBadge();
      if (window.saveDebugMode) window.saveDebugMode(val);
    });
  }

  window._origLog = console.log;
  // Override console.log based on debugMode
  console.log = function() {
    if (window.mdConfig && window.mdConfig.debugMode) {
      window._origLog.apply(console, arguments);
    }
  };
  // Intercept all link clicks and handle appropriately
  document.addEventListener('click', function(e) {
    var target = e.target;
    while (target && target.tagName !== 'A') {
      target = target.parentNode;
    }
    if (target && target.tagName === 'A') {
      var href = target.getAttribute('href');
      if (!href || href.startsWith('#')) return;

      if (href.startsWith('http://') || href.startsWith('https://')) {
        e.preventDefault();
        if (window.openExternal) window.openExternal(target.href);
      } else if (href.startsWith('file://')) {
        e.preventDefault();
        var path = decodeURIComponent(href.replace('file://', ''));
        // If it's a markdown file, open it in-app, otherwise use system
        if (path.toLowerCase().endsWith('.md') || path.toLowerCase().endsWith('.markdown')) {
          if (window.openFileByPath) window.openFileByPath(path);
        } else {
          if (window.openExternal) window.openExternal(href);
        }
      } else if (!href.includes('://')) {
        // Likely a relative local link
        e.preventDefault();
        if (window.handleRelativeLink) window.handleRelativeLink(href);
      }
    }
  });

  // Report window size to Go for persistence (on resize only)
  var _resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(function() {
      // Resize handling is done via Go-side timer
    }, 500);
  });
</script>
<script>
// TOC Functions
function debounce(func, wait) {
  var timeout;
  return function() {
    var context = this, args = arguments;
    clearTimeout(timeout);
    timeout = setTimeout(function() {
      func.apply(context, args);
    }, wait);
  };
}

function renderTOC(toc) {
  var list = document.getElementById('toc-list');
  if (!list) return;
  if (!toc || !toc.length) {
    list.innerHTML = '<li style="padding:16px;color:var(--color-fg-muted);font-size:12px;">無標題</li>';
    return;
  }
  var html = '';
  for (var i = 0; i < toc.length; i++) {
    var item = toc[i];
    var levelClass = 'toc-h' + Math.min(item.level, 6);
    html += '<li class="' + levelClass + '"><a href="#' + item.id + '">' + item.text + '</a></li>';
  }
  list.innerHTML = html;
  
  // Add click handlers
  list.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var id = this.getAttribute('href').substring(1);
      var el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({behavior: 'smooth', block: 'start'});
        history.pushState(null, null, '#' + id);
      }
    });
  });
}

function toggleTOC() {
  var panel = document.getElementById('toc-panel');
  if (!panel) return;
  panel.classList.toggle('visible');
  var isVisible = panel.classList.contains('visible');
  if (window.mdConfig) window.mdConfig.showTOC = isVisible;
  // Save to Go
  if (window.saveTOC) window.saveTOC(isVisible);
}

// Initialize TOC on load
document.addEventListener('DOMContentLoaded', function() {
  if (window._tocJSON) renderTOC(window._tocJSON);
  if (window._showTOC) {
    var panel = document.getElementById('toc-panel');
    if (panel) panel.classList.add('visible');
  }
  // Close button
  var closeBtn = document.getElementById('toc-close');
  if (closeBtn) closeBtn.addEventListener('click', toggleTOC);
});

// Highlight active heading on scroll
var tocHighlight = debounce(function() {
  var headings = document.querySelectorAll('h1[id], h2[id], h3[id], h4[id], h5[id], h6[id]');
  var activeId = '';
  var scrollY = window.scrollY;
  for (var i = headings.length - 1; i >= 0; i--) {
    if (headings[i].offsetTop <= scrollY + 100) {
      activeId = headings[i].id;
      break;
    }
  }
  var tocLinks = document.querySelectorAll('#toc-list a');
  tocLinks.forEach(function(a) {
    a.classList.toggle('active', a.getAttribute('href') === '#' + activeId);
  });
}, 100);

window.addEventListener('scroll', tocHighlight);

// Global error handler to send JS errors to Go
window.addEventListener('error', function(e) {
  // Prevent showing standard browser error messages
  e.preventDefault();
  
  // Send error to Go if the binding exists
  if (window.jsError) {
    var errorMsg = 'JS Error: ' + e.message;
    if (e.filename && e.lineno) {
      errorMsg += ' (' + e.filename + ':' + e.lineno + ')';
    }
    window.jsError(errorMsg);
  }
  
  // Also log to console for debugging
  console.error(e);
});

// Handle promise rejections
window.addEventListener('unhandledrejection', function(e) {
  e.preventDefault();
  if (window.jsError) {
    var errorMsg = 'Promise Rejection: ' + e.reason;
    if (e.reason && e.reason.stack) {
      errorMsg += '\nStack: ' + e.reason.stack;
    }
    window.jsError(errorMsg);
  }
  console.error(e);
});
</script>
</body>
</html>
